# 片刻 (Pianke) — 跨平台构建流水线
#
# 每次推送 tag (v*) 时自动构建 macOS / Windows / Linux 安装包。
# 产物上传到 GitHub Releases。
#
# macOS:   .dmg
# Windows: .msi 或 .exe (NSIS)
# Linux:   .AppImage 或 .deb
#
# 手动触发：在 GitHub 仓库 Actions 页面点 "Run workflow"。

name: 构建

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      mode:
        description: '构建模式 (fast / expert / all)'
        required: false
        default: 'fast'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装系统依赖
        run: |
          # Tauri 在 macOS 上需要一些系统库
          brew install webkit2gtk-4.1 2>/dev/null || true

      - name: 构建 Tauri 应用
        run: |
          cd src-tauri
          cargo tauri build --ci

      - name: 上传 macOS 产物
        uses: actions/upload-artifact@v4
        with:
          name: pianke-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 构建 Tauri 应用
        run: |
          cd src-tauri
          cargo tauri build --ci
        shell: pwsh

      - name: 上传 Windows 产物
        uses: actions/upload-artifact@v4
        with:
          name: pianke-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: 构建 Tauri 应用
        run: |
          cd src-tauri
          cargo tauri build --ci

      - name: 上传 Linux 产物
        uses: actions/upload-artifact@v4
        with:
          name: pianke-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

  # 可选：发布到 GitHub Releases（仅在打 tag 时触发）
  publish:
    needs: [ build-macos, build-windows, build-linux ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/pianke-macos/*.dmg
            artifacts/pianke-windows/*.msi
            artifacts/pianke-windows/*.exe
            artifacts/pianke-linux/*.AppImage
            artifacts/pianke-linux/*.deb
          generate_release_notes: true
