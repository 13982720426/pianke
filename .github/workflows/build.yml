# 片刻 (Pianke) — 跨平台构建流水线
#
# 推送 main、推送 tag (v*) 或手动触发时构建 macOS / Windows / Linux 安装包。
# 普通构建产物上传到 workflow artifacts，tag 构建额外发布到 GitHub Releases。
#
# macOS:   .dmg
# Windows: .msi 或 .exe (NSIS)
# Linux:   .AppImage 或 .deb
#
# 手动触发：在 GitHub 仓库 Actions 页面点 "Run workflow"。

name: 构建

on:
  push:
    branches: [ 'main' ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      platform:
        description: '构建平台'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - macos
          - windows
          - linux

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    if: github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'macos'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: 构建 Tauri 应用
        run: |
          cd src-tauri
          cargo tauri build --ci

      - name: 上传 macOS 产物
        uses: actions/upload-artifact@v4
        with:
          name: pianke-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn

  build-windows:
    if: github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'windows'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: 构建 Tauri 应用
        run: |
          cd src-tauri
          cargo tauri build --ci
        shell: pwsh

      - name: 上传 Windows 产物
        uses: actions/upload-artifact@v4
        with:
          name: pianke-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  build-linux:
    if: github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'linux'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: 构建 Tauri 应用
        run: |
          cd src-tauri
          cargo tauri build --ci

      - name: 上传 Linux 产物
        uses: actions/upload-artifact@v4
        with:
          name: pianke-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

  # 可选：发布到 GitHub Releases（仅在打 tag 时触发）
  publish:
    needs: [ build-macos, build-windows, build-linux ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/pianke-macos/*.dmg
            artifacts/pianke-windows/*.msi
            artifacts/pianke-windows/*.exe
            artifacts/pianke-linux/*.AppImage
            artifacts/pianke-linux/*.deb
          generate_release_notes: true
